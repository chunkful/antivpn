---
check: !<net.chunkful.antivpn.check.CacheAdapter>
  cache: !<net.chunkful.antivpn.check.cache.sql.SqlCache>
    url: 'jdbc:sqlite:cache.db'
    username: SA
    password: ''
  check: !<net.chunkful.antivpn.check.ProxycheckCheck>
    apiKey: SOME-API-KEY
exemption: !<net.chunkful.antivpn.exemption.PermissionExemption> {}
lock: !<net.chunkful.antivpn.lock.SqlLock>
  url: 'jdbc:sqlite:cache.db'
  username: SA
  password: ''
messages:
  lockFail: |-
    <red>You are not allowed to connect using this IP address.</red>
    <yellow>If you believe this is a mistake, please contact an administrator.</yellow>
  checkFail: |-
    <red>Connecting using a VPN or proxy is not allowed.</red>
    <yellow>If you believe this is a mistake, please contact an administrator.</yellow>